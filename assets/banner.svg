<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <!-- Accent gradient (Google-inspired) -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="25%" stop-color="#EA4335"/>
      <stop offset="50%" stop-color="#FBBC04"/>
      <stop offset="75%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#4285F4"/>
    </linearGradient>
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#c7d2fe"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Soft shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#4285F4" flood-opacity="0.3"/>
    </filter>
    <!-- Waveform clip -->
    <clipPath id="waveClip">
      <rect x="0" y="0" width="1200" height="400" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" clip-path="url(#waveClip)">
    <line x1="0" y1="80" x2="1200" y2="80" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="1200" y2="320" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="400" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="400" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Decorative waveform (left side) -->
  <g opacity="0.12" transform="translate(60, 200)">
    <rect x="0" y="-30" width="4" height="60" rx="2" fill="#4285F4"/>
    <rect x="10" y="-50" width="4" height="100" rx="2" fill="#EA4335"/>
    <rect x="20" y="-70" width="4" height="140" rx="2" fill="#FBBC04"/>
    <rect x="30" y="-45" width="4" height="90" rx="2" fill="#34A853"/>
    <rect x="40" y="-60" width="4" height="120" rx="2" fill="#4285F4"/>
    <rect x="50" y="-35" width="4" height="70" rx="2" fill="#EA4335"/>
    <rect x="60" y="-80" width="4" height="160" rx="2" fill="#FBBC04"/>
    <rect x="70" y="-40" width="4" height="80" rx="2" fill="#34A853"/>
    <rect x="80" y="-55" width="4" height="110" rx="2" fill="#4285F4"/>
    <rect x="90" y="-25" width="4" height="50" rx="2" fill="#EA4335"/>
  </g>

  <!-- Decorative waveform (right side) -->
  <g opacity="0.12" transform="translate(1040, 200)">
    <rect x="0" y="-25" width="4" height="50" rx="2" fill="#EA4335"/>
    <rect x="10" y="-55" width="4" height="110" rx="2" fill="#4285F4"/>
    <rect x="20" y="-40" width="4" height="80" rx="2" fill="#34A853"/>
    <rect x="30" y="-80" width="4" height="160" rx="2" fill="#FBBC04"/>
    <rect x="40" y="-35" width="4" height="70" rx="2" fill="#EA4335"/>
    <rect x="50" y="-60" width="4" height="120" rx="2" fill="#4285F4"/>
    <rect x="60" y="-45" width="4" height="90" rx="2" fill="#34A853"/>
    <rect x="70" y="-70" width="4" height="140" rx="2" fill="#FBBC04"/>
    <rect x="80" y="-50" width="4" height="100" rx="2" fill="#EA4335"/>
    <rect x="90" y="-30" width="4" height="60" rx="2" fill="#4285F4"/>
  </g>

  <!-- Decorative circles -->
  <circle cx="180" cy="80" r="50" fill="#4285F4" opacity="0.06"/>
  <circle cx="1020" cy="320" r="70" fill="#EA4335" opacity="0.05"/>
  <circle cx="950" cy="70" r="35" fill="#FBBC04" opacity="0.06"/>
  <circle cx="250" cy="330" r="40" fill="#34A853" opacity="0.05"/>

  <!-- Microphone icon -->
  <g transform="translate(505, 60)" filter="url(#shadow)">
    <!-- Mic body -->
    <rect x="0" y="0" width="28" height="44" rx="14" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
    <!-- Mic stand arc -->
    <path d="M-8 36 Q-8 60 14 60 Q36 60 36 36" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mic stand line -->
    <line x1="14" y1="60" x2="14" y2="74" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Mic base -->
    <line x1="2" y1="74" x2="26" y2="74" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Sound waves -->
    <path d="M38 10 Q50 22 38 34" fill="none" stroke="#4285F4" stroke-width="2" opacity="0.6" stroke-linecap="round"/>
    <path d="M46 2 Q62 22 46 42" fill="none" stroke="#4285F4" stroke-width="2" opacity="0.35" stroke-linecap="round"/>
  </g>

  <!-- Gemini sparkle icon -->
  <g transform="translate(640, 72)" opacity="0.8">
    <path d="M12 0 L14.5 9.5 L24 12 L14.5 14.5 L12 24 L9.5 14.5 L0 12 L9.5 9.5 Z" fill="#FBBC04"/>
    <path d="M22 18 L23.2 22.8 L28 24 L23.2 25.2 L22 30 L20.8 25.2 L16 24 L20.8 22.8 Z" fill="#FBBC04" opacity="0.6"/>
  </g>

  <!-- App title -->
  <text x="600" y="188" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="700" font-size="52" fill="url(#titleGrad)" letter-spacing="-1">
    Gemini Voice Library
  </text>

  <!-- Accent line -->
  <rect x="420" y="206" width="360" height="3" rx="1.5" fill="url(#accent)" opacity="0.7"/>

  <!-- Subtitle -->
  <text x="600" y="240" text-anchor="middle" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-weight="400" font-size="18" fill="#94a3b8" letter-spacing="0.5">
    Powered by Gemini 3.1 Flash TTS — 70+ Languages — Multi-Speaker Dialogue
  </text>

  <!-- Feature pills -->
  <g transform="translate(600, 280)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="12" font-weight="500">
    <!-- 30 Voices -->
    <g transform="translate(-460, 0)">
      <rect x="0" y="0" width="110" height="32" rx="16" fill="#4285F4" opacity="0.15" stroke="#4285F4" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="55" y="21" text-anchor="middle" fill="#93c5fd">30 AI Voices</text>
    </g>
    <!-- AI Casting -->
    <g transform="translate(-330, 0)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#EA4335" opacity="0.15" stroke="#EA4335" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="60" y="21" text-anchor="middle" fill="#fca5a5">AI Casting</text>
    </g>
    <!-- 70+ Languages -->
    <g transform="translate(-190, 0)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#FBBC04" opacity="0.15" stroke="#FBBC04" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="60" y="21" text-anchor="middle" fill="#fde68a">70+ Languages</text>
    </g>
    <!-- Audio Tags -->
    <g transform="translate(-50, 0)">
      <rect x="0" y="0" width="110" height="32" rx="16" fill="#34A853" opacity="0.15" stroke="#34A853" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="55" y="21" text-anchor="middle" fill="#86efac">Audio Tags</text>
    </g>
    <!-- Dialogue -->
    <g transform="translate(80, 0)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#a855f7" opacity="0.15" stroke="#a855f7" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="60" y="21" text-anchor="middle" fill="#d8b4fe">Multi-Speaker</text>
    </g>
    <!-- WAV Export -->
    <g transform="translate(220, 0)">
      <rect x="0" y="0" width="110" height="32" rx="16" fill="#4285F4" opacity="0.15" stroke="#4285F4" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="55" y="21" text-anchor="middle" fill="#93c5fd">WAV Export</text>
    </g>
    <!-- Single Binary -->
    <g transform="translate(350, 0)">
      <rect x="0" y="0" width="120" height="32" rx="16" fill="#EA4335" opacity="0.15" stroke="#EA4335" stroke-width="0.8" stroke-opacity="0.3"/>
      <text x="60" y="21" text-anchor="middle" fill="#fca5a5">Single Binary</text>
    </g>
  </g>

  <!-- Tech badges row -->
  <g transform="translate(600, 340)" font-family="'Segoe UI', system-ui, -apple-system, sans-serif" font-size="11" font-weight="400" opacity="0.5">
    <text x="0" y="14" text-anchor="middle" fill="#94a3b8" letter-spacing="3">
      REACT 19  ·  GO  ·  GEMINI 3.1 FLASH TTS  ·  SQLITE  ·  VITE  ·  TAILWIND CSS
    </text>
  </g>

  <!-- Bottom accent line -->
  <rect x="0" y="396" width="1200" height="4" rx="0" fill="url(#accent)" opacity="0.5"/>
</svg>
