<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400" role="img" aria-labelledby="title desc">
  <title id="title">Gemini Voice Studio production workflow banner</title>
  <desc id="desc">A banner for Gemini Voice Studio highlighting Gemini 3.1 Flash TTS, AI casting, projects, cast bible, review and QC, export jobs, custom presets, pronunciation dictionaries, and encrypted key management.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="42%" stop-color="#122e3f"/>
      <stop offset="72%" stop-color="#2b2148"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>

    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4285F4"/>
      <stop offset="25%" stop-color="#EA4335"/>
      <stop offset="50%" stop-color="#FBBC04"/>
      <stop offset="75%" stop-color="#34A853"/>
      <stop offset="100%" stop-color="#4285F4"/>
    </linearGradient>

    <linearGradient id="panel" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#172033" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#0b1220" stop-opacity="0.92"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="55%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#cffafe"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity="0.35"/>
    </filter>

    <filter id="softGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <clipPath id="bannerClip">
      <rect x="0" y="0" width="1200" height="400" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1200" height="400" rx="16" fill="url(#bg)"/>

  <g clip-path="url(#bannerClip)">
    <g opacity="0.06">
      <path d="M0 72 H1200 M0 144 H1200 M0 216 H1200 M0 288 H1200 M0 360 H1200" stroke="#ffffff" stroke-width="0.7"/>
      <path d="M120 0 V400 M240 0 V400 M360 0 V400 M480 0 V400 M600 0 V400 M720 0 V400 M840 0 V400 M960 0 V400 M1080 0 V400" stroke="#ffffff" stroke-width="0.7"/>
    </g>

    <g opacity="0.14" transform="translate(42 176)">
      <rect x="0" y="-34" width="5" height="68" rx="2.5" fill="#4285F4"/>
      <rect x="13" y="-58" width="5" height="116" rx="2.5" fill="#EA4335"/>
      <rect x="26" y="-84" width="5" height="168" rx="2.5" fill="#FBBC04"/>
      <rect x="39" y="-46" width="5" height="92" rx="2.5" fill="#34A853"/>
      <rect x="52" y="-66" width="5" height="132" rx="2.5" fill="#4285F4"/>
      <rect x="65" y="-38" width="5" height="76" rx="2.5" fill="#EA4335"/>
      <rect x="78" y="-96" width="5" height="192" rx="2.5" fill="#FBBC04"/>
      <rect x="91" y="-50" width="5" height="100" rx="2.5" fill="#34A853"/>
    </g>

    <g opacity="0.14" transform="translate(1052 176)">
      <rect x="0" y="-50" width="5" height="100" rx="2.5" fill="#34A853"/>
      <rect x="13" y="-96" width="5" height="192" rx="2.5" fill="#FBBC04"/>
      <rect x="26" y="-38" width="5" height="76" rx="2.5" fill="#EA4335"/>
      <rect x="39" y="-66" width="5" height="132" rx="2.5" fill="#4285F4"/>
      <rect x="52" y="-46" width="5" height="92" rx="2.5" fill="#34A853"/>
      <rect x="65" y="-84" width="5" height="168" rx="2.5" fill="#FBBC04"/>
      <rect x="78" y="-58" width="5" height="116" rx="2.5" fill="#EA4335"/>
      <rect x="91" y="-34" width="5" height="68" rx="2.5" fill="#4285F4"/>
    </g>

    <path d="M110 326 C260 280 374 360 522 310 C690 254 826 362 1076 292" fill="none" stroke="#67e8f9" stroke-width="2" opacity="0.16"/>
    <path d="M108 331 C278 292 400 342 532 324 C696 300 828 330 1078 304" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.13"/>
  </g>

  <g font-family="'Segoe UI', system-ui, -apple-system, BlinkMacSystemFont, sans-serif">
    <g transform="translate(600 32)" text-anchor="middle">
      <g transform="translate(-382 7) scale(0.78)" opacity="0.9" filter="url(#softGlow)">
        <rect x="0" y="0" width="26" height="40" rx="13" fill="none" stroke="url(#accent)" stroke-width="2.5"/>
        <path d="M-8 32 C-8 52 7 63 13 63 C30 63 34 48 34 32" fill="none" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M13 63 V78 M1 78 H25" stroke="url(#accent)" stroke-width="2.5" stroke-linecap="round"/>
      </g>
      <g transform="translate(346 18) scale(0.9)" opacity="0.9" filter="url(#softGlow)">
        <path d="M13 0 L16 10 L26 13 L16 16 L13 26 L10 16 L0 13 L10 10 Z" fill="#FBBC04"/>
        <path d="M32 17 L34 24 L41 26 L34 28 L32 35 L30 28 L23 26 L30 24 Z" fill="#FBBC04" opacity="0.65"/>
      </g>

      <text x="0" y="61" font-weight="700" font-size="50" fill="url(#titleGrad)" letter-spacing="0">Gemini Voice Studio</text>
      <text x="0" y="96" font-weight="400" font-size="18" fill="#cbd5e1" letter-spacing="0">Gemini 3.1 Flash TTS production suite for casting, scripts, review, and export</text>
      <rect x="-275" y="115" width="550" height="3" rx="1.5" fill="url(#accent)" opacity="0.75"/>
    </g>

    <g transform="translate(105 168)" filter="url(#shadow)">
      <path d="M170 44 H205 M375 44 H410 M580 44 H615 M785 44 H820" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>

      <g transform="translate(0 0)">
        <rect width="170" height="88" rx="10" fill="url(#panel)" stroke="#4285F4" stroke-width="1" stroke-opacity="0.45"/>
        <g transform="translate(20 22)">
          <path d="M15 0 L18.5 11.5 L30 15 L18.5 18.5 L15 30 L11.5 18.5 L0 15 L11.5 11.5 Z" fill="#60a5fa"/>
          <path d="M36 24 L38 30 L44 32 L38 34 L36 40 L34 34 L28 32 L34 30 Z" fill="#60a5fa" opacity="0.65"/>
        </g>
        <text x="76" y="33" font-weight="700" font-size="16" fill="#dbeafe" letter-spacing="0">AI Casting</text>
        <text x="76" y="56" font-weight="400" font-size="10.5" fill="#a8b7cc" letter-spacing="0">Top voice matches</text>
      </g>

      <g transform="translate(205 0)">
        <rect width="170" height="88" rx="10" fill="url(#panel)" stroke="#EA4335" stroke-width="1" stroke-opacity="0.45"/>
        <g transform="translate(20 23)" fill="none" stroke="#fca5a5" stroke-width="2.4" stroke-linejoin="round">
          <path d="M6 7 H35 V35 H6 Z"/>
          <path d="M13 0 H42 V28"/>
          <path d="M14 16 H28 M14 24 H32"/>
        </g>
        <text x="76" y="33" font-weight="700" font-size="16" fill="#fee2e2" letter-spacing="0">Projects</text>
        <text x="76" y="56" font-weight="400" font-size="10.5" fill="#a8b7cc" letter-spacing="0">Sections, segments</text>
      </g>

      <g transform="translate(410 0)">
        <rect width="170" height="88" rx="10" fill="url(#panel)" stroke="#FBBC04" stroke-width="1" stroke-opacity="0.5"/>
        <g transform="translate(20 21)" fill="none" stroke="#fde68a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 19 C25 19 30 14 30 8 C30 3.5 26.5 0 22 0 C17.5 0 14 3.5 14 8 C14 12.5 16 16 19 19 Z"/>
          <path d="M5 42 C7 31 15 25 23 25 C31 25 39 31 41 42"/>
          <path d="M5 14 C1 15 -1 18 0 22 C1 26 4 29 9 30"/>
          <path d="M39 14 C43 15 45 18 44 22 C43 26 40 29 35 30"/>
        </g>
        <text x="76" y="33" font-weight="700" font-size="16" fill="#fef3c7" letter-spacing="0">Cast Bible</text>
        <text x="76" y="56" font-weight="400" font-size="10.5" fill="#a8b7cc" letter-spacing="0">Profiles, continuity</text>
      </g>

      <g transform="translate(615 0)">
        <rect width="170" height="88" rx="10" fill="url(#panel)" stroke="#34A853" stroke-width="1" stroke-opacity="0.48"/>
        <g transform="translate(20 23)" fill="none" stroke="#86efac" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="21" cy="21" r="19"/>
          <path d="M12 21 L18 27 L31 14"/>
          <path d="M1 42 H42"/>
        </g>
        <text x="74" y="33" font-weight="700" font-size="14" fill="#dcfce7" letter-spacing="0">Review + QC</text>
        <text x="76" y="56" font-weight="400" font-size="10.5" fill="#a8b7cc" letter-spacing="0">Takes, flags, issues</text>
      </g>

      <g transform="translate(820 0)">
        <rect width="170" height="88" rx="10" fill="url(#panel)" stroke="#38bdf8" stroke-width="1" stroke-opacity="0.48"/>
        <g transform="translate(20 21)" fill="none" stroke="#7dd3fc" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 16 L22 6 L39 16 V36 L22 46 L5 36 Z"/>
          <path d="M5 16 L22 26 L39 16"/>
          <path d="M22 26 V46"/>
          <path d="M22 0 V14 M15 7 L22 14 L29 7"/>
        </g>
        <text x="76" y="33" font-weight="700" font-size="16" fill="#e0f2fe" letter-spacing="0">Export</text>
        <text x="76" y="56" font-weight="400" font-size="10.5" fill="#a8b7cc" letter-spacing="0">WAV, ZIP, jobs</text>
      </g>
    </g>

    <g transform="translate(600 298)" text-anchor="middle">
      <text x="0" y="0" font-size="15" font-weight="600" fill="#e2e8f0" letter-spacing="0">30 voices | custom presets | 70+ languages | pronunciation dictionaries | performance styles | client workspaces</text>
      <text x="0" y="28" font-size="13" font-weight="400" fill="#94a3b8" letter-spacing="0">streaming TTS | batch render | AI script prep | mini player | AES-256-GCM key pool | single cross-platform binary</text>
    </g>

    <text x="600" y="365" text-anchor="middle" font-size="11" font-weight="500" fill="#64748b" letter-spacing="0">
      REACT 19  /  GO  /  SQLITE  /  VITE  /  TAILWIND CSS  /  GEMINI 3.1 FLASH TTS
    </text>
  </g>

  <rect x="0" y="396" width="1200" height="4" fill="url(#accent)" opacity="0.55"/>
</svg>
